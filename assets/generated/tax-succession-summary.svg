<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">事業承継税制を検討する前に整理すること</title>
  <desc id="desc">事業承継税制の前に、後継者、株式、資金繰り、承継方法、専門家確認を整理する流れ。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07172c"/><stop offset="60%" stop-color="#102846"/><stop offset="100%" stop-color="#876a35"/>
    </linearGradient>
    <style>
      .jp{font-family:"Noto Sans JP","Yu Gothic","Hiragino Sans",sans-serif}.serif{font-family:"Shippori Mincho","Yu Mincho",serif}
      .eyebrow{font-size:24px;fill:#d9c18a;letter-spacing:.08em}.title{font-size:48px;font-weight:700;fill:#fffaf0}.lead{font-size:26px;fill:#f3ead6}
      .head{font-size:24px;fill:#102846;font-weight:700}.body{font-size:20px;fill:#4d5a6b}.num{font-size:22px;fill:#fffaf0;font-weight:700}
    </style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="76" y="88" class="jp eyebrow">Business Succession Tax</text>
  <text x="76" y="158" class="jp serif title">税制の前に、承継の設計を決める。</text>
  <text x="78" y="214" class="jp lead">制度利用だけでなく、誰に・何を・どう渡すかを整理する。</text>
  <g transform="translate(88 310)">
    <rect x="0" y="0" width="1018" height="340" rx="28" fill="#fffaf0"/>
    <g transform="translate(54 54)">
      <circle cx="28" cy="28" r="28" fill="#102846"/><text x="16" y="37" class="jp num">1</text>
      <text x="82" y="20" class="jp head">後継者の意思</text><text x="82" y="54" class="jp body">継ぐ人の覚悟と経営体制</text>
      <circle cx="28" cy="118" r="28" fill="#102846"/><text x="16" y="127" class="jp num">2</text>
      <text x="82" y="110" class="jp head">株式と議決権</text><text x="82" y="144" class="jp body">誰が何株持つか、分散リスク</text>
      <circle cx="28" cy="208" r="28" fill="#102846"/><text x="16" y="217" class="jp num">3</text>
      <text x="82" y="200" class="jp head">資金繰り</text><text x="82" y="234" class="jp body">納税・借入・保証の影響</text>
    </g>
    <g transform="translate(560 54)">
      <circle cx="28" cy="28" r="28" fill="#102846"/><text x="16" y="37" class="jp num">4</text>
      <text x="82" y="20" class="jp head">承継方法の比較</text><text x="82" y="54" class="jp body">親族内・社内・第三者承継</text>
      <circle cx="28" cy="118" r="28" fill="#102846"/><text x="16" y="127" class="jp num">5</text>
      <text x="82" y="110" class="jp head">専門家確認</text><text x="82" y="144" class="jp body">税理士・支援機関と書面確認</text>
    </g>
  </g>
  <text x="90" y="710" class="jp" font-size="22" fill="#e8dac0">税制は目的ではなく、承継を実現するための手段です。</text>
</svg>
